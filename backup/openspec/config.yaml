schema: spec-driven
project: MBSE
init_artifact_id: sdd-init/MBSE

persistence:
  mode: openspec
  backend: openspec

context: |
  Stack: Python workspace bootstrap with devcontainer and VS Code task support.
  Architecture: Configuration-first repository, no application modules committed yet.
  Testing: pytest is available in the devcontainer, but no project tests exist yet.
  Style: Ruff config sets 80-char lines, 2-space indentation, double quotes, and LF endings.
  Workflow: Devcontainer is primary environment; VS Code task launches the OpenCode web GUI.

strict_tdd: true

testing:
  detected: 2026-05-19
  strict_tdd: true
  runner:
    available: true
    framework: pytest
    command: pytest
  layers:
    unit:
      available: true
      tool: pytest
    integration:
      available: true
      tool: pytest
    e2e:
      available: false
      tool: ""
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ruff check .
      note: Configured in pyproject.toml, but ruff is not installed in the current container.
    type_checker:
      available: false
      command: ""
    formatter:
      available: false
      command: ruff format .
      note: Ruff formatting is configured, but the executable is not installed.

rules:
  proposal:
    - State the user value, boundaries, and rollback path for risky changes.
  specs:
    - Use RFC 2119 keywords for normative requirements.
    - Write scenarios in Given/When/Then form.
  design:
    - Explain tradeoffs and fit with the repository's current structure.
  tasks:
    - Group tasks by phase and keep each task reviewable in one session.
  apply:
    - Follow existing Python and workspace conventions.
    tdd: true
    test_command: pytest
  verify:
    test_command: pytest
    build_command: ""
    coverage_threshold: 0
  archive:
    - Merge only verified deltas into main specs.
